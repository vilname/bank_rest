databaseChangeLog:
  - changeSet:
      id: 002-create-card-table
      author: developer
      changes:
        - createTable:
            tableName: card
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: number
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: balance
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: owner
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: expiry_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created
                  type: TIMESTAMP
              - column:
                  name: updated
                  type: TIMESTAMP
        - addForeignKeyConstraint:
            baseTableName: card
            baseColumnNames: user_id
            referencedTableName: user
            referencedColumnNames: id
            constraintName: fk_card_user
            onDelete: CASCADE
        - createIndex:
            tableName: card
            indexName: idx_card_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: card
            indexName: idx_card_status
            columns:
              - column:
                  name: status
        - createIndex:
            tableName: card
            indexName: idx_card_expiry_date
            columns:
              - column:
                  name: expiry_date
      rollback:
        - dropTable:
            tableName: card