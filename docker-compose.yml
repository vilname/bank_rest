services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bank_rest}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-12345}
    ports:
      - "${DB_PORT:-5435}:5432"
    command: >
      postgres
      -c max_connections=${PG_MAX_CONNECTIONS:-200}
      -c shared_buffers=${PG_SHARED_BUFFERS:-256MB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - bank-rest-network

  test:
    image: maven:3.9.9-eclipse-temurin-17
    working_dir: /app
    volumes:
      - .:/app
      - ~/.m2:/root/.m2
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-bank_rest}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-12345}
      TESTCONTAINERS_RYUK_DISABLED: "true"
    networks:
      - bank-rest-network
    command: mvn test

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-bank_rest}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-12345}
      SERVER_PORT: 8080
      JAVA_OPTS: ${JAVA_OPTS:-}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_PAN_SECRET: ${APP_PAN_SECRET}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS}
    ports:
      - "${APP_PORT:-8080}:8080"
    networks:
      - bank-rest-network

volumes:
  postgres_data:

networks:
  bank-rest-network:
    driver: bridge

