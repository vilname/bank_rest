databaseChangeLog:
  - changeSet:
      id: 004-create-transfer-table
      author: developer
      changes:
        - createTable:
            tableName: transfer
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: balance
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: created
                  type: TIMESTAMP
              - column:
                  name: card_from_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: card_to_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: transfer
            baseColumnNames: card_from_id
            referencedTableName: card
            referencedColumnNames: id
            constraintName: fk_transfer_card_from
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: transfer
            baseColumnNames: card_to_id
            referencedTableName: card
            referencedColumnNames: id
            constraintName: fk_transfer_card_to
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: transfer
            baseColumnNames: user_id
            referencedTableName: user
            referencedColumnNames: id
            constraintName: fk_transfer_user
            onDelete: CASCADE
        - createIndex:
            tableName: transfer
            indexName: idx_transfer_card_from_id
            columns:
              - column:
                  name: card_from_id
        - createIndex:
            tableName: transfer
            indexName: idx_transfer_card_to_id
            columns:
              - column:
                  name: card_to_id
        - createIndex:
            tableName: transfer
            indexName: idx_transfer_user_id
            columns:
              - column:
                  name: user_id
        - createIndex:
            tableName: transfer
            indexName: idx_transfer_created
            columns:
              - column:
                  name: created
      rollback:
        - dropTable:
            tableName: transfer