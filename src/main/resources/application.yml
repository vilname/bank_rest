server:
  port: ${SERVER_PORT:8080}
  tomcat:
    threads:
      max: ${SERVER_TOMCAT_THREADS_MAX:400}
    accept-count: ${SERVER_TOMCAT_ACCEPT_COUNT:200}

spring:
  application:
    name: bank_rest
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bank_rest}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:12345}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:80}
      minimum-idle: ${HIKARI_MIN_IDLE:10}
      connection-timeout: ${HIKARI_CONNECTION_TIMEOUT_MS:30000}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: true
    show-sql: true
  liquibase:
    change-log: classpath:/db/changelog/db.changelog-master.yml

springdoc:
  version: 1.0.0
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

logging:
  level:
    org.hibernate.SQL: DEBUG  # Логирование SQL запросов
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE  # Логирование параметров запросов
    org.hibernate.engine.jdbc.batch.internal: DEBUG

